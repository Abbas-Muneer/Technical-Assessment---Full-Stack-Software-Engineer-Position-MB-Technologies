services:
  mysql:
    image: mysql:8.0.36
    container_name: todo-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todo_app}
      MYSQL_USER: ${MYSQL_USER:-todo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: todo-backend
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-todo_app}
      DB_USERNAME: ${MYSQL_USER:-todo_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-todo_password}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-4173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: todo-frontend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql-data:
